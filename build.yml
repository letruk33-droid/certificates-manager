name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask openpyxl pyinstaller
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --name "Сертификаты" --add-data "templates;templates" app.py
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Сертификаты
        path: dist/Сертификаты.exe